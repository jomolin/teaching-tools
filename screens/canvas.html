<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screen Canvas - Teaching Tools</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>

    <!-- Theme sync from shared config - MUST be in head -->
    <script src="./config.js"></script>

    <!-- Lucide icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

    <!-- Gridstack: drag/resize grid -->
    <link href="https://cdn.jsdelivr.net/npm/gridstack@10.3.1/dist/gridstack.min.css" rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/gridstack@10.3.1/dist/gridstack-all.js"></script>

    <style>
        .grid-stack > .grid-stack-placeholder > .placeholder-content {
            background: rgba(59, 130, 246, 0.08);
            border: 2px dashed rgb(59, 130, 246);
            border-radius: 0.75rem;
        }
        html.dark .grid-stack > .grid-stack-placeholder > .placeholder-content {
            background: rgba(96, 165, 250, 0.10);
            border-color: rgb(96, 165, 250);
        }
        /* Widget content slot fills its grid cell and clips overflow so
           widget internals stay inside the tile when resized small. */
        .grid-stack-item-content {
            inset: 0 !important;
            overflow: hidden !important;
            display: flex;
            flex-direction: column;
            border-radius: 0.75rem;
        }
        .grid-stack-item-content > .widget-host {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        /* The widgets' top-level Tailwind containers (the bg-white card divs
           inside their templates) need to fill height and allow internal
           scrolling rather than overflowing the tile. */
        .grid-stack-item-content > .widget-host > * {
            flex: 1;
            min-height: 0;
            height: 100%;
            overflow: auto;
        }
        /* Widget-specific overrides: noise meter and random picker have their
           own layout logic and shouldn't show scrollbars on the outer card.
           They use flex layouts internally that need to be respected. */
        .grid-stack-item-content > .noise-meter-widget > *,
        .grid-stack-item-content > .random-picker-widget > *,
        .grid-stack-item-content > .seven-pickers-widget > * {
            overflow: visible;
        }
        .tile-chrome {
            display: none;
            position: absolute;
            top: 6px;
            right: 6px;
            z-index: 10;
            gap: 4px;
        }
        body.edit-mode .tile-chrome { display: flex; }
        .drag-handle {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 28px;
            z-index: 9;
            cursor: move;
            background: linear-gradient(to bottom, rgba(0,0,0,0.04), transparent);
            border-top-left-radius: 0.75rem;
            border-top-right-radius: 0.75rem;
        }
        html.dark .drag-handle {
            background: linear-gradient(to bottom, rgba(255,255,255,0.06), transparent);
        }
        body.edit-mode .drag-handle { display: block; }
        body:not(.edit-mode) .ui-resizable-handle { display: none !important; }

        [data-lucide] {
            width: 1em;
            height: 1em;
            stroke-width: 2;
        }

        #bootError {
            display: none;
            padding: 2rem;
            text-align: center;
        }
        body.boot-failed #bootError { display: block; }
        body.boot-failed .normal-ui { display: none; }
    </style>

    <!--
        ARCHITECTURE NOTE
        -----------------
        Each widget IIFE in /screens/widgets/ is declared as `const TitleWidget = ...`,
        which does NOT attach to `window` in script-tag context. So the canvas cannot
        look up `window.TitleWidget` to call `init()` after adding new tiles.

        TWO-PART STRATEGY:
          1. For the INITIAL render, build the tile DOM synchronously in <head>
             before the widget scripts load. Each widget's own DOMContentLoaded
             handler then scans the document, finds the containers, and initializes
             them - exactly like every other screen page.
          2. For ADDING a new tile via the Add bar, OR SWITCHING layouts, we trigger
             a full page reload. Reloads are cheap (everything is in localStorage)
             and they sidestep every concern about widgets not exposing public APIs.

        For Phase 2, each widget file gets one line added to expose its IIFE on
        window, after which we can do clean dynamic add/remove without reload.
        Phase 1 keeps the widgets untouched.
    -->
</head>
<body class="min-h-screen bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 flex flex-col">

    <!-- Catastrophic failure UI -->
    <div id="bootError">
        <div class="text-4xl mb-4">&#9888;</div>
        <div class="text-xl font-semibold mb-4">Canvas failed to start</div>
        <div id="bootErrorMessage" class="text-sm text-gray-600 dark:text-gray-400 mb-4 max-w-xl mx-auto"></div>
        <button onclick="location.reload()" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-md">Reload</button>
    </div>

    <div class="normal-ui flex-1 flex flex-col">
        <!-- Toolbar -->
        <header class="flex items-center gap-3 px-5 py-3 bg-white dark:bg-gray-800 border-b-2 border-gray-300 dark:border-gray-700 shadow-sm">
            <label class="text-sm font-medium text-gray-600 dark:text-gray-400 hidden md:inline">Layout</label>
            <select id="layoutSelect"
                    class="px-3 py-2 bg-white dark:bg-gray-700 border-2 border-gray-300 dark:border-gray-600 rounded-md text-gray-900 dark:text-gray-100 font-medium focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors min-w-[160px]">
            </select>

            <button id="newLayoutBtn"
                    class="px-3 py-2 bg-gray-200 hover:bg-gray-300 dark:bg-gray-700 dark:hover:bg-gray-600 text-gray-900 dark:text-gray-100 font-semibold rounded-md transition-colors flex items-center gap-1.5"
                    title="New layout">
                <i data-lucide="plus"></i>
                <span class="hidden sm:inline">New</span>
            </button>

            <button id="renameLayoutBtn"
                    class="px-3 py-2 bg-gray-200 hover:bg-gray-300 dark:bg-gray-700 dark:hover:bg-gray-600 text-gray-900 dark:text-gray-100 font-semibold rounded-md transition-colors flex items-center gap-1.5"
                    title="Rename layout">
                <i data-lucide="edit-3"></i>
            </button>

            <button id="duplicateLayoutBtn"
                    class="px-3 py-2 bg-gray-200 hover:bg-gray-300 dark:bg-gray-700 dark:hover:bg-gray-600 text-gray-900 dark:text-gray-100 font-semibold rounded-md transition-colors flex items-center gap-1.5"
                    title="Duplicate layout">
                <i data-lucide="copy"></i>
            </button>

            <button id="deleteLayoutBtn"
                    class="px-3 py-2 bg-gray-200 hover:bg-gray-300 dark:bg-gray-700 dark:hover:bg-gray-600 text-red-600 dark:text-red-400 font-semibold rounded-md transition-colors flex items-center gap-1.5"
                    title="Delete layout">
                <i data-lucide="trash-2"></i>
            </button>

            <div class="flex-1"></div>

            <button id="editModeBtn"
                    class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-md transition-colors flex items-center gap-2"
                    title="Toggle edit mode">
                <i data-lucide="edit"></i>
                <span class="hidden sm:inline">Edit</span>
            </button>
        </header>

        <!-- Add-widget bar -->
        <div id="editToolbar"
             class="hidden bg-blue-50 dark:bg-gray-800 border-b border-blue-200 dark:border-gray-700 px-5 py-2 flex items-center gap-2 flex-wrap">
            <span class="text-sm font-medium text-gray-600 dark:text-gray-400 mr-2">Add:</span>
            <div id="addWidgetButtons" class="flex items-center gap-2 flex-wrap"></div>
            <div class="flex-1"></div>
            <span class="text-xs text-gray-500 dark:text-gray-400 italic hidden md:inline">
                Drag top of tile to move &middot; Drag corner to resize &middot; Adding a widget reloads the page
            </span>
        </div>

        <!-- Grid -->
        <main class="flex-1 p-5">
            <div class="grid-stack"></div>
            <div id="emptyState" class="hidden text-center py-20 text-gray-500 dark:text-gray-400">
                <div class="text-5xl mb-4">&#9881;</div>
                <div class="text-xl font-semibold mb-2">This layout is empty</div>
                <div class="text-sm">Click <strong>Edit</strong> above, then add a widget to get started.</div>
            </div>
        </main>
    </div>

    <!--
        STEP 1: synchronously build tile DOM from localStorage BEFORE widget scripts run.
        This must be inline (not external) and use no async APIs. localStorage is sync,
        so this works. When the widget <script> tags below execute, they queue their
        DOMContentLoaded handlers; when DOM parsing finishes, those handlers fire and
        find our containers ready.
    -->
    <script>
    (function() {
        'use strict';

        const STORAGE = {
            LAYOUTS: 'screenLayouts',
            ACTIVE: 'screenCanvasActive'
        };

        // Widget catalog used both by the pre-render step (here) and by the canvas
        // controller (below). Single source of truth.
        const WIDGET_TYPES = {
            title: {
                label: 'Title', icon: 'type', cls: 'title-widget',
                default: { w: 8, h: 3 },
                attrs: {
                    'data-title': 'New Title',
                    'data-instructions': '<ol><li>Edit me by clicking</li></ol>'
                },
                needsId: false
            },
            timer: {
                label: 'Timer', icon: 'timer', cls: 'timer-widget',
                default: { w: 4, h: 3 },
                attrs: { 'data-time': '05:00' },
                needsId: false
            },
            'noise-meter': {
                label: 'Noise Meter', icon: 'volume-2', cls: 'noise-meter-widget',
                default: { w: 6, h: 5 },
                attrs: { 'data-threshold': '2' },
                needsId: false
            },
            'random-picker': {
                label: 'Random Picker', icon: 'shuffle', cls: 'random-picker-widget',
                default: { w: 6, h: 5 },
                attrs: { 'data-title': 'Random Picker' },
                needsId: true
            },
            'seven-pickers': {
                label: 'Seven Pickers', icon: 'users', cls: 'seven-pickers-widget',
                default: { w: 12, h: 5 },
                attrs: {},
                needsId: false
            }
        };

        function genId() { return 'w-' + Math.random().toString(36).slice(2, 9); }

        // Load layouts, seeding a default on first run.
        let layouts = {};
        try {
            const raw = localStorage.getItem(STORAGE.LAYOUTS);
            if (raw) layouts = JSON.parse(raw) || {};
        } catch (e) {
            console.error('Could not read screenLayouts:', e);
        }
        if (Object.keys(layouts).length === 0) {
            layouts['Classroom'] = {
                items: [
                    { id: genId(), type: 'title', x: 0, y: 0, w: 8, h: 3,
                      opts: { 'data-title': 'Welcome', 'data-instructions': '<ol><li>Sit down</li><li>Get ready to learn</li></ol>' } },
                    { id: genId(), type: 'timer', x: 8, y: 0, w: 4, h: 3,
                      opts: { 'data-time': '05:00' } },
                    { id: genId(), type: 'random-picker', x: 0, y: 3, w: 6, h: 5,
                      opts: { 'data-title': 'Student Picker' } },
                    { id: genId(), type: 'noise-meter', x: 6, y: 3, w: 6, h: 5,
                      opts: { 'data-threshold': '2' } }
                ]
            };
            try { localStorage.setItem(STORAGE.LAYOUTS, JSON.stringify(layouts)); } catch (e) {}
        }

        let activeLayout = null;
        try { activeLayout = JSON.parse(localStorage.getItem(STORAGE.ACTIVE) || 'null'); } catch (e) {}
        if (!activeLayout || !layouts[activeLayout]) {
            activeLayout = Object.keys(layouts)[0];
            try { localStorage.setItem(STORAGE.ACTIVE, JSON.stringify(activeLayout)); } catch (e) {}
        }

        // Stash everything for the controller below so it doesn't redo the work.
        window.__CANVAS = {
            STORAGE: STORAGE,
            WIDGET_TYPES: WIDGET_TYPES,
            layouts: layouts,
            activeLayout: activeLayout,
            genId: genId
        };

        // Render the tile DOM into .grid-stack as plain divs. Gridstack will be
        // initialized below and will adopt these existing children via init().
        // We use document.write only as a *fallback* if the .grid-stack element
        // doesn't exist yet (it shouldn't at this point, since this script is in
        // <head>) - actually we just defer the DOM building to DOMContentLoaded
        // BUT we mark the layout for the controller to render.
        // Actually we need to be smarter: this script runs BEFORE body parsing,
        // so the .grid-stack div doesn't exist yet. We can't insert tiles here.
        // Instead, the controller (below) builds tiles in its own DOMContentLoaded
        // handler - which fires BEFORE the widget DOMContentLoaded handlers because
        // listeners run in registration order, and the controller script runs
        // immediately after the widget <script> tags.
        //
        // WAIT - all DOMContentLoaded handlers attached before the event fires run
        // in registration order. Widget scripts register theirs when they execute.
        // The controller script below them registers later. So controller fires
        // AFTER widgets - too late.
        //
        // Real fix: the controller registers its handler in this CURRENT script
        // (which runs before any widget script), so the controller fires FIRST.
        document.addEventListener('DOMContentLoaded', function preRender() {
            const gridEl = document.querySelector('.grid-stack');
            if (!gridEl) return;
            const items = layouts[activeLayout].items;
            items.forEach(function(item) {
                gridEl.appendChild(buildTileElement(item));
            });
        });

        // Tile builder - also used by the controller for new tiles after init.
        // Putting it on __CANVAS so the controller can call it.
        function buildTileElement(item) {
            const type = WIDGET_TYPES[item.type];
            const tile = document.createElement('div');
            tile.className = 'grid-stack-item';
            tile.setAttribute('gs-id', item.id);
            tile.setAttribute('gs-x', item.x);
            tile.setAttribute('gs-y', item.y);
            tile.setAttribute('gs-w', item.w);
            tile.setAttribute('gs-h', item.h);

            const content = document.createElement('div');
            content.className = 'grid-stack-item-content relative';

            const handle = document.createElement('div');
            handle.className = 'drag-handle';
            content.appendChild(handle);

            const chrome = document.createElement('div');
            chrome.className = 'tile-chrome';
            const delBtn = document.createElement('button');
            delBtn.className = 'tile-delete px-2 py-1 bg-white dark:bg-gray-700 hover:bg-red-50 dark:hover:bg-red-900/30 text-red-600 dark:text-red-400 border border-gray-300 dark:border-gray-600 rounded-md text-sm shadow-sm transition-colors flex items-center gap-1';
            delBtn.title = 'Remove this widget';
            delBtn.setAttribute('data-delete-id', item.id);
            delBtn.innerHTML = '<i data-lucide="x"></i>';
            chrome.appendChild(delBtn);
            content.appendChild(chrome);

            const host = document.createElement('div');
            if (!type) {
                host.className = 'widget-host p-4 text-sm text-red-600 dark:text-red-400';
                host.textContent = 'Unknown widget type: ' + item.type;
            } else {
                host.className = 'widget-host ' + type.cls;
                if (type.needsId) host.id = item.id;
                const attrs = item.opts || type.attrs;
                Object.entries(attrs).forEach(function(entry) {
                    host.setAttribute(entry[0], entry[1]);
                });
            }
            content.appendChild(host);
            tile.appendChild(content);
            return tile;
        }
        window.__CANVAS.buildTileElement = buildTileElement;

        // Boot error trap
        window.__bootErrors = [];
        window.addEventListener('error', function(e) {
            console.error('Boot error:', e.message, e.filename);
            window.__bootErrors.push(e.message + ' (' + (e.filename || 'inline') + ')');
        });
    })();
    </script>

    <!-- Widget scripts. By the time their DOMContentLoaded handlers fire, the
         pre-render step (registered above) will have populated the grid-stack
         div with tile divs that have the matching CSS classes, so each widget
         finds its containers and initializes normally. -->
    <script src="./widgets/utils.js"></script>
    <script src="./widgets/title.js"></script>
    <script src="./widgets/timer.js"></script>
    <script src="./widgets/noise-meter.js"></script>
    <script src="./widgets/random-picker.js"></script>
    <script src="./widgets/seven-pickers.js"></script>

    <script>
    /* ============================================================
       Canvas Controller
       Runs after widgets have auto-initialized via their own
       DOMContentLoaded handlers. We just wire up the toolbar and
       Gridstack.
    ============================================================ */
    (function() {
        'use strict';

        const CTX = window.__CANVAS;
        if (!CTX) {
            document.body.classList.add('boot-failed');
            document.getElementById('bootErrorMessage').textContent = 'Pre-render context missing.';
            return;
        }

        const STORAGE = CTX.STORAGE;
        const WIDGET_TYPES = CTX.WIDGET_TYPES;
        let layouts = CTX.layouts;
        let activeLayout = CTX.activeLayout;
        const genId = CTX.genId;
        const buildTileElement = CTX.buildTileElement;

        let grid = null;
        let editMode = false;
        let suppressSave = false;
        // Set to true right before a deliberate location.reload(). Prevents the
        // beforeunload handler from running persistCurrentLayout() and clobbering
        // the data we just saved (the grid still has the OLD nodes at this point,
        // so persisting would write the pre-add state back over our new state).
        let suppressBeforeUnload = false;

        function readJSON(key, fallback) {
            try {
                if (typeof ClassroomUtils !== 'undefined') {
                    return ClassroomUtils.getFromStorage(key, fallback);
                }
                const raw = localStorage.getItem(key);
                return raw === null ? fallback : JSON.parse(raw);
            } catch (e) { return fallback; }
        }
        function writeJSON(key, value) {
            try {
                if (typeof ClassroomUtils !== 'undefined') {
                    return ClassroomUtils.saveToStorage(key, value);
                }
                localStorage.setItem(key, JSON.stringify(value));
                return true;
            } catch (e) { return false; }
        }
        function saveLayouts() { writeJSON(STORAGE.LAYOUTS, layouts); }
        function saveActive() { writeJSON(STORAGE.ACTIVE, activeLayout); }

        function refreshLayoutSelector() {
            const sel = document.getElementById('layoutSelect');
            sel.innerHTML = '';
            Object.keys(layouts).sort().forEach(name => {
                const opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name;
                if (name === activeLayout) opt.selected = true;
                sel.appendChild(opt);
            });
        }

        function initGrid() {
            // Initialize Gridstack on the existing pre-rendered tile DOM.
            // Gridstack picks up children with class 'grid-stack-item' and reads
            // their gs-* attributes automatically.
            grid = GridStack.init({
                column: 12,
                cellHeight: 70,
                margin: 10,
                handle: '.drag-handle',
                // Bottom corners and sides only. The top edge is reserved for the
                // drag-handle bar, and the top-right corner is reserved for the
                // delete button - including 'n', 'ne', or 'nw' here would steal
                // clicks from those controls.
                resizable: { handles: 'se, sw, e, w, s' },
                disableDrag: true,
                disableResize: true,
                float: true,
                animate: true
            });

            grid.on('change', () => { if (!suppressSave) persistCurrentLayout(); });

            // Wire delete buttons (we set data-delete-id during pre-render)
            document.querySelectorAll('.tile-delete[data-delete-id]').forEach(btn => {
                const id = btn.getAttribute('data-delete-id');
                btn.addEventListener('click', () => {
                    if (confirm('Remove this widget from this layout? Its saved data (text, picks, etc.) is preserved.')) {
                        removeTile(id);
                    }
                });
            });
        }

        function removeTile(id) {
            const el = document.querySelector('.grid-stack-item[gs-id="' + id + '"]');
            if (!el) return;
            grid.removeWidget(el, true);
            persistCurrentLayout();
            updateEmptyState();
        }

        function persistCurrentLayout() {
            if (!activeLayout || !grid) return;
            const items = [];
            grid.engine.nodes.forEach(node => {
                const el = node.el;
                if (!el) return;
                const id = el.getAttribute('gs-id');
                const host = el.querySelector('.widget-host');
                if (!host) return;
                let type = null;
                for (const [k, v] of Object.entries(WIDGET_TYPES)) {
                    if (host.classList.contains(v.cls)) { type = k; break; }
                }
                if (!type) return;
                const opts = {};
                Array.from(host.attributes).forEach(a => {
                    if (a.name.startsWith('data-')) opts[a.name] = a.value;
                });
                items.push({
                    id, type,
                    x: node.x, y: node.y, w: node.w, h: node.h,
                    opts
                });
            });
            layouts[activeLayout].items = items;
            saveLayouts();
        }

        function updateEmptyState() {
            const empty = document.getElementById('emptyState');
            const hasItems = layouts[activeLayout] && layouts[activeLayout].items.length > 0;
            empty.classList.toggle('hidden', hasItems);
        }

        // Layout switching reloads the page so widget DOMContentLoaded handlers
        // run again against the new tiles. Pragmatic, robust, fast.
        function switchLayout(name) {
            if (!layouts[name]) return;
            persistCurrentLayout();
            activeLayout = name;
            saveActive();
            suppressBeforeUnload = true;
            location.reload();
        }
        function newLayout() {
            const name = prompt('Name for the new layout:', 'New Layout');
            if (!name) return;
            if (layouts[name]) { alert('A layout with that name already exists.'); return; }
            layouts[name] = { items: [] };
            saveLayouts();
            activeLayout = name;
            saveActive();
            suppressBeforeUnload = true;
            location.reload();
        }
        function renameLayout() {
            if (!activeLayout) return;
            const newName = prompt('Rename layout:', activeLayout);
            if (!newName || newName === activeLayout) return;
            if (layouts[newName]) { alert('A layout with that name already exists.'); return; }
            layouts[newName] = layouts[activeLayout];
            delete layouts[activeLayout];
            activeLayout = newName;
            saveLayouts();
            saveActive();
            refreshLayoutSelector();
        }
        function duplicateLayout() {
            if (!activeLayout) return;
            const base = activeLayout;
            let name = base + ' (copy)';
            let n = 2;
            while (layouts[name]) { name = base + ' (copy ' + n + ')'; n++; }
            const cloned = layouts[base].items.map(it => ({
                ...it, id: genId(), opts: { ...it.opts }
            }));
            layouts[name] = { items: cloned };
            saveLayouts();
            activeLayout = name;
            saveActive();
            suppressBeforeUnload = true;
            location.reload();
        }
        function deleteLayout() {
            if (!activeLayout) return;
            if (Object.keys(layouts).length <= 1) {
                alert('You need at least one layout. Rename this one or create another first.');
                return;
            }
            if (!confirm('Delete the layout "' + activeLayout + '"? Widget data saved by other layouts is unaffected.')) return;
            delete layouts[activeLayout];
            saveLayouts();
            activeLayout = Object.keys(layouts)[0];
            saveActive();
            suppressBeforeUnload = true;
            location.reload();
        }

        function setEditMode(on) {
            editMode = on;
            document.body.classList.toggle('edit-mode', on);
            document.getElementById('editToolbar').classList.toggle('hidden', !on);
            const btn = document.getElementById('editModeBtn');
            btn.innerHTML = on
                ? '<i data-lucide="check"></i><span class="hidden sm:inline">Done</span>'
                : '<i data-lucide="edit"></i><span class="hidden sm:inline">Edit</span>';
            btn.classList.toggle('bg-green-600', on);
            btn.classList.toggle('hover:bg-green-700', on);
            btn.classList.toggle('bg-blue-600', !on);
            btn.classList.toggle('hover:bg-blue-700', !on);
            if (on) {
                grid.enableMove(true);
                grid.enableResize(true);
            } else {
                grid.enableMove(false);
                grid.enableResize(false);
                persistCurrentLayout();
            }
            renderIconsSafely();
        }

        function buildAddWidgetButtons() {
            const container = document.getElementById('addWidgetButtons');
            container.innerHTML = '';
            // We don't have a way to detect which widget IIFEs loaded (they use
            // const not window). Just show all of them - if the file failed, the
            // resulting empty tile is the same visible feedback as any other failure.
            Object.entries(WIDGET_TYPES).forEach(([key, type]) => {
                const btn = document.createElement('button');
                btn.className = 'px-3 py-1.5 bg-white dark:bg-gray-700 border-2 border-blue-600 dark:border-blue-700 text-blue-600 dark:text-blue-400 hover:bg-blue-50 dark:hover:bg-gray-600 font-medium rounded-md transition-colors flex items-center gap-1.5 text-sm';
                btn.innerHTML = '<i data-lucide="' + type.icon + '"></i><span>' + type.label + '</span>';
                btn.addEventListener('click', () => addNewWidget(key));
                container.appendChild(btn);
            });
        }

        function addNewWidget(typeKey) {
            const type = WIDGET_TYPES[typeKey];
            if (!type) return;
            // Save current state of the layout before adding the new item
            persistCurrentLayout();
            const existing = layouts[activeLayout].items;
            let maxY = 0;
            existing.forEach(it => { maxY = Math.max(maxY, it.y + it.h); });
            const item = {
                id: genId(),
                type: typeKey,
                x: 0, y: maxY,
                w: type.default.w,
                h: type.default.h,
                opts: { ...type.attrs }
            };
            layouts[activeLayout].items.push(item);
            saveLayouts();
            // Reload so the widget's own DOMContentLoaded handler picks up the new tile.
            // Suppress beforeunload save so the (stale) grid state doesn't overwrite our work.
            suppressBeforeUnload = true;
            location.reload();
        }

        function renderIconsSafely() {
            if (typeof lucide !== 'undefined' && lucide.createIcons) {
                try { lucide.createIcons(); } catch (e) {}
            }
        }

        function init() {
            const missing = [];
            if (typeof GridStack === 'undefined') missing.push('Gridstack (CDN)');
            if (missing.length) {
                document.body.classList.add('boot-failed');
                document.getElementById('bootErrorMessage').textContent =
                    'Required scripts did not load: ' + missing.join(', ') + '.';
                return;
            }

            try {
                initGrid();
                refreshLayoutSelector();
                buildAddWidgetButtons();
                updateEmptyState();

                document.getElementById('layoutSelect').addEventListener('change', e => switchLayout(e.target.value));
                document.getElementById('newLayoutBtn').addEventListener('click', newLayout);
                document.getElementById('renameLayoutBtn').addEventListener('click', renameLayout);
                document.getElementById('duplicateLayoutBtn').addEventListener('click', duplicateLayout);
                document.getElementById('deleteLayoutBtn').addEventListener('click', deleteLayout);
                document.getElementById('editModeBtn').addEventListener('click', () => setEditMode(!editMode));

                window.addEventListener('beforeunload', () => {
                    if (!suppressBeforeUnload) persistCurrentLayout();
                });

                let tries = 0;
                (function r() {
                    if (typeof lucide !== 'undefined' && lucide.createIcons) {
                        lucide.createIcons();
                    } else if (tries++ < 30) {
                        setTimeout(r, 100);
                    }
                })();
            } catch (e) {
                console.error('Canvas init failed:', e);
                document.body.classList.add('boot-failed');
                document.getElementById('bootErrorMessage').textContent = 'Initialisation error: ' + e.message;
            }
        }

        // The pre-render script registered its DOMContentLoaded handler before any
        // widget script ran. Widgets registered theirs as they loaded. We register
        // ours now (last in the document), so we fire LAST - after every widget has
        // initialized its instances on the pre-rendered tiles. That's the right
        // order: don't init Gridstack until widgets have rendered their UIs into
        // the tile hosts.
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    })();
    </script>
</body>
</html>
