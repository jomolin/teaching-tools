<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSLA Literacy Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <script>
        // Theme sync — must run before body renders
        (function() {
            const theme = localStorage.getItem('theme') || 'light';
            if (theme === 'dark') {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
            window.addEventListener('storage', function(e) {
                if (e.key === 'theme') {
                    if (e.newValue === 'dark') {
                        document.documentElement.classList.add('dark');
                    } else {
                        document.documentElement.classList.remove('dark');
                    }
                }
            });
        })();
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="fixed inset-0 bg-gray-100 dark:bg-gray-900 flex items-center justify-center z-50">
        <div class="text-center">
            <div class="text-4xl mb-4 animate-spin text-blue-600 dark:text-blue-400">&#9881;</div>
            <div class="text-lg font-semibold text-gray-700 dark:text-gray-300">Loading BSLA Literacy Planner...</div>
        </div>
    </div>

    <!-- Main Content -->
    <div id="mainContent" style="display: none;" class="max-w-7xl mx-auto p-4">

        <!-- Header -->
        <div class="mb-6">
            <h1 class="text-2xl font-bold text-gray-900 dark:text-gray-100">BSLA Literacy Planner</h1>
            <p class="text-sm text-gray-600 dark:text-gray-400 mt-1" id="headerMeta"></p>
        </div>

        <!-- Stats -->
        <div class="bg-white dark:bg-gray-800 rounded-lg shadow-md p-4 mb-6">
            <div class="grid grid-cols-3 md:grid-cols-6 gap-4">
                <div class="text-center">
                    <div class="text-2xl font-bold text-blue-600 dark:text-blue-400" id="phomCompleted">0</div>
                    <div class="text-xs text-gray-600 dark:text-gray-400 mt-1">PhOM Done</div>
                </div>
                <div class="text-center">
                    <div class="text-2xl font-bold text-gray-500 dark:text-gray-400" id="phomTotal">0</div>
                    <div class="text-xs text-gray-600 dark:text-gray-400 mt-1">PhOM Total</div>
                </div>
                <div class="text-center">
                    <div class="text-2xl font-bold text-green-600 dark:text-green-400" id="readingCompleted">0</div>
                    <div class="text-xs text-gray-600 dark:text-gray-400 mt-1">Reading Done</div>
                </div>
                <div class="text-center">
                    <div class="text-2xl font-bold text-gray-500 dark:text-gray-400" id="readingTotal">0</div>
                    <div class="text-xs text-gray-600 dark:text-gray-400 mt-1">Reading Total</div>
                </div>
                <div class="text-center">
                    <div class="text-2xl font-bold text-purple-600 dark:text-purple-400" id="writingCompleted">0</div>
                    <div class="text-xs text-gray-600 dark:text-gray-400 mt-1">Writing Done</div>
                </div>
                <div class="text-center">
                    <div class="text-2xl font-bold text-gray-500 dark:text-gray-400" id="writingTotal">0</div>
                    <div class="text-xs text-gray-600 dark:text-gray-400 mt-1">Writing Total</div>
                </div>
            </div>
            <!-- Progress bar -->
            <div class="mt-4 bg-gray-200 dark:bg-gray-700 rounded-full h-3 overflow-hidden">
                <div id="progressBar" class="h-full bg-blue-600 dark:bg-blue-500 rounded-full transition-all duration-300" style="width: 0%"></div>
            </div>
            <div class="text-xs text-center text-gray-500 dark:text-gray-400 mt-1" id="progressLabel">0% complete</div>
        </div>

        <!-- Tabs -->
        <div class="flex gap-1 mb-6 border-b-2 border-gray-300 dark:border-gray-700 overflow-x-auto">
            <button class="tab-btn px-4 py-3 font-semibold text-blue-600 dark:text-blue-400 hover:text-blue-600 dark:hover:text-blue-400 transition-colors whitespace-nowrap text-sm"
                    style="border-bottom: 3px solid currentColor;" data-tab="phom">
                PhOM
            </button>
            <button class="tab-btn px-4 py-3 font-semibold text-gray-500 dark:text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 transition-colors whitespace-nowrap text-sm"
                    data-tab="reading">
                Reading
            </button>
            <button class="tab-btn px-4 py-3 font-semibold text-gray-500 dark:text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 transition-colors whitespace-nowrap text-sm"
                    data-tab="writing">
                Writing
            </button>
            <button class="tab-btn px-4 py-3 font-semibold text-gray-500 dark:text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 transition-colors whitespace-nowrap text-sm"
                    data-tab="planner">
                Weekly Planner
            </button>
        </div>

        <!-- PhOM Tab -->
        <div id="phom" class="tab-content">
            <div class="flex flex-wrap gap-2 mb-4">
                <button id="phomMarkNextBtn" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 dark:bg-blue-700 dark:hover:bg-blue-600 text-white font-semibold rounded-md transition-colors text-sm">
                    Mark Next Complete
                </button>
                <button id="phomResetBtn" class="px-4 py-2 bg-red-600 hover:bg-red-700 dark:bg-red-700 dark:hover:bg-red-600 text-white font-semibold rounded-md transition-colors text-sm">
                    Reset
                </button>
                <button id="exportBtn" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 dark:bg-blue-700 dark:hover:bg-blue-600 text-white font-semibold rounded-md transition-colors text-sm">
                    Export
                </button>
                <button id="importBtn" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 dark:bg-blue-700 dark:hover:bg-blue-600 text-white font-semibold rounded-md transition-colors text-sm">
                    Import
                </button>
                <input type="file" id="importFile" accept=".json" class="hidden">
            </div>
            <!-- Global resources info -->
            <div id="phomResources" class="bg-blue-50 dark:bg-blue-900 dark:bg-opacity-20 border border-blue-200 dark:border-blue-800 rounded-lg p-3 mb-4">
                <div class="font-semibold text-blue-900 dark:text-blue-100 text-sm mb-2">Global PhOM Resources</div>
                <div id="phomResourceLinks" class="text-sm text-blue-800 dark:text-blue-200 flex flex-wrap gap-3"></div>
            </div>
            <div id="phomContainer"></div>
        </div>

        <!-- Reading Tab -->
        <div id="reading" class="tab-content hidden">
            <div class="flex flex-wrap gap-2 mb-4">
                <button id="readingMarkNextBtn" class="px-4 py-2 bg-green-600 hover:bg-green-700 dark:bg-green-700 dark:hover:bg-green-600 text-white font-semibold rounded-md transition-colors text-sm">
                    Mark Next Complete
                </button>
                <button id="readingResetBtn" class="px-4 py-2 bg-red-600 hover:bg-red-700 dark:bg-red-700 dark:hover:bg-red-600 text-white font-semibold rounded-md transition-colors text-sm">
                    Reset
                </button>
            </div>
            <div id="readingResources" class="bg-green-50 dark:bg-green-900 dark:bg-opacity-20 border border-green-200 dark:border-green-800 rounded-lg p-3 mb-4">
                <div class="font-semibold text-green-900 dark:text-green-100 text-sm mb-2">Global Reading Resources</div>
                <div id="readingResourceLinks" class="text-sm text-green-800 dark:text-green-200 flex flex-wrap gap-3"></div>
            </div>
            <div id="readingContainer"></div>
        </div>

        <!-- Writing Tab -->
        <div id="writing" class="tab-content hidden">
            <div class="flex flex-wrap gap-2 mb-4">
                <button id="writingMarkNextBtn" class="px-4 py-2 bg-purple-600 hover:bg-purple-700 dark:bg-purple-700 dark:hover:bg-purple-600 text-white font-semibold rounded-md transition-colors text-sm">
                    Mark Next Complete
                </button>
                <button id="writingResetBtn" class="px-4 py-2 bg-red-600 hover:bg-red-700 dark:bg-red-700 dark:hover:bg-red-600 text-white font-semibold rounded-md transition-colors text-sm">
                    Reset
                </button>
            </div>
            <div id="writingContainer"></div>
        </div>

        <!-- Weekly Planner Tab -->
        <div id="planner" class="tab-content hidden">
            <div class="bg-blue-50 dark:bg-blue-900 dark:bg-opacity-20 border border-blue-200 dark:border-blue-800 rounded-lg p-3 mb-4">
                <div class="font-semibold text-blue-900 dark:text-blue-100 text-sm">Next Lessons Up</div>
                <div class="text-xs text-blue-800 dark:text-blue-200 mt-1">Click any box to copy its content. Resource links open in new tabs.</div>
            </div>
            <div id="plannerContent"></div>
        </div>

        <!-- Toast -->
        <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-900 dark:bg-gray-100 text-white dark:text-gray-900 px-5 py-3 rounded-lg shadow-lg font-semibold text-sm z-50 transition-all duration-300 opacity-0 pointer-events-none">
            Copied!
        </div>
    </div>

    <!-- Lesson Detail Modal -->
    <div id="lessonModal" class="fixed inset-0 bg-black bg-opacity-50 z-40 hidden flex items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-xl max-w-lg w-full max-h-[90vh] overflow-y-auto p-6">
            <div class="flex justify-between items-start mb-4">
                <h3 id="modalTitle" class="text-lg font-bold text-gray-900 dark:text-gray-100"></h3>
                <button id="modalClose" class="text-gray-500 hover:text-gray-700 dark:hover:text-gray-300 text-xl leading-none">&times;</button>
            </div>
            <div id="modalBody" class="text-sm text-gray-700 dark:text-gray-300 space-y-3"></div>
        </div>
    </div>

<script>
let DATA = null;

class LiteracyPlanner {
    constructor() {
        this.progress = this.loadProgress();
    }

    async init() {
        try {
            const response = await fetch('./data/bsla_taumata10.json');
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            DATA = await response.json();

            document.getElementById('loadingOverlay').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';

            this.setupHeader();
            this.setupGlobalResources();
            this.setupEventListeners();
            this.render();
            this.initLucide();
        } catch (error) {
            document.getElementById('loadingOverlay').innerHTML = `
                <div class="text-center p-6">
                    <div class="text-4xl mb-4 text-red-500">&#10060;</div>
                    <div class="text-xl font-semibold text-red-600 dark:text-red-400 mb-4">Failed to load data</div>
                    <div class="text-gray-700 dark:text-gray-300 mb-4">${error.message}</div>
                    <button onclick="location.reload()" class="px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-md font-semibold">Retry</button>
                </div>`;
        }
    }

    initLucide() {
        // Retry loop for Lucide icon rendering
        let attempts = 0;
        const tryCreate = () => {
            try {
                if (typeof lucide !== 'undefined') {
                    lucide.createIcons();
                } else if (attempts < 10) {
                    attempts++;
                    setTimeout(tryCreate, 200);
                }
            } catch(e) { /* silently fail */ }
        };
        tryCreate();
    }

    setupHeader() {
        document.getElementById('headerMeta').textContent =
            `Taumata ${DATA.taumata} | Year ${DATA.year_level} | Theme: ${DATA.theme}`;
    }

    setupGlobalResources() {
        const gr = DATA.global_resources;

        // PhOM global resources
        const phomLinks = [
            { label: 'Activities PDF', url: gr.phom_activities_pdf },
            { label: 'Lesson Plans PDF', url: gr.phom_lesson_plans_pdf },
            { label: 'Spelling Lessons PPT', url: gr.spelling_lessons_ppt },
            { label: 'Better Spelling Test', url: gr.better_spelling_test_pdf },
            { label: 'Scope & Sequence', url: gr.scope_and_sequence }
        ];
        document.getElementById('phomResourceLinks').innerHTML = phomLinks.map(l =>
            `<a href="${l.url}" target="_blank" rel="noopener" class="underline hover:no-underline">${l.label} &#8599;</a>`
        ).join('');

        // Reading global resources
        const readLinks = [
            { label: 'Comprehension Lesson Plans', url: gr.reading_comp_lesson_plans_pdf },
            { label: 'Comprehension PPTs', url: gr.reading_comp_ppt_folder },
            { label: 'Reading Texts', url: gr.reading_texts_folder }
        ];
        document.getElementById('readingResourceLinks').innerHTML = readLinks.map(l =>
            `<a href="${l.url}" target="_blank" rel="noopener" class="underline hover:no-underline">${l.label} &#8599;</a>`
        ).join('');
    }

    // ── Progress ──────────────────────────────────────────────

    loadProgress() {
        const saved = localStorage.getItem('bslaLiteracyProgress');
        return saved ? JSON.parse(saved) : { phom: {}, reading: {}, writing: {} };
    }

    saveProgress() {
        localStorage.setItem('bslaLiteracyProgress', JSON.stringify(this.progress));
    }

    isCompleted(strand, lessonNum) {
        return !!this.progress[strand][lessonNum];
    }

    toggleLesson(strand, lessonNum) {
        if (this.progress[strand][lessonNum]) {
            delete this.progress[strand][lessonNum];
        } else {
            this.progress[strand][lessonNum] = true;
        }
        this.saveProgress();
        this.render();
    }

    markNextComplete(strand) {
        const allLessons = this.getAllLessonNums(strand);
        for (const num of allLessons) {
            if (!this.progress[strand][num]) {
                this.progress[strand][num] = true;
                this.saveProgress();
                this.render();
                return;
            }
        }
    }

    resetStrand(strand) {
        if (!confirm(`Reset all ${strand.toUpperCase()} progress? This cannot be undone.`)) return;
        this.progress[strand] = {};
        this.saveProgress();
        this.render();
    }

    getAllLessonNums(strand) {
        const nums = [];
        for (const unit of DATA[strand]) {
            for (const lesson of unit.lessons) {
                nums.push(lesson.lesson_number);
            }
        }
        return nums;
    }

    getNextIncomplete(strand) {
        const allLessons = [];
        for (const unit of DATA[strand]) {
            for (const lesson of unit.lessons) {
                allLessons.push({ unit, lesson });
            }
        }
        for (const item of allLessons) {
            if (!this.progress[strand][item.lesson.lesson_number]) {
                return item;
            }
        }
        return null;
    }

    // Returns the next 5 incomplete lessons for a strand
    getNextFive(strand) {
        const results = [];
        for (const unit of DATA[strand]) {
            for (const lesson of unit.lessons) {
                if (!this.progress[strand][lesson.lesson_number]) {
                    results.push({ unit, lesson });
                    if (results.length >= 5) return results;
                }
            }
        }
        return results;
    }

    // ── Rendering ─────────────────────────────────────────────

    render() {
        this.renderPhom();
        this.renderReading();
        this.renderWriting();
        this.renderPlanner();
        this.updateStats();
        this.initLucide();
    }

    updateStats() {
        const phomNums = this.getAllLessonNums('phom');
        const readNums = this.getAllLessonNums('reading');
        const writeNums = this.getAllLessonNums('writing');

        const phomDone = phomNums.filter(n => this.progress.phom[n]).length;
        const readDone = readNums.filter(n => this.progress.reading[n]).length;
        const writeDone = writeNums.filter(n => this.progress.writing[n]).length;

        document.getElementById('phomCompleted').textContent = phomDone;
        document.getElementById('phomTotal').textContent = phomNums.length;
        document.getElementById('readingCompleted').textContent = readDone;
        document.getElementById('readingTotal').textContent = readNums.length;
        document.getElementById('writingCompleted').textContent = writeDone;
        document.getElementById('writingTotal').textContent = writeNums.length;

        const total = phomNums.length + readNums.length + writeNums.length;
        const done = phomDone + readDone + writeDone;
        const pct = total > 0 ? Math.round((done / total) * 100) : 0;
        document.getElementById('progressBar').style.width = pct + '%';
        document.getElementById('progressLabel').textContent = `${pct}% complete (${done}/${total})`;
    }

    // ── PhOM Tracker ──────────────────────────────────────────

    renderPhom() {
        const container = document.getElementById('phomContainer');
        let html = '';

        for (const unit of DATA.phom) {
            const unitLessons = unit.lessons;
            const completedCount = unitLessons.filter(l => this.isCompleted('phom', l.lesson_number)).length;
            const allDone = completedCount === unitLessons.length;

            html += `<div class="bg-white dark:bg-gray-800 border-2 ${allDone ? 'border-green-400 dark:border-green-600' : 'border-gray-300 dark:border-gray-700'} rounded-xl p-4 shadow-sm mb-4">`;
            html += `<div class="flex justify-between items-center mb-3">
                <div>
                    <span class="font-bold text-gray-900 dark:text-gray-100">Unit ${unit.unit}: <span class="font-mono text-blue-600 dark:text-blue-400">${unit.morpheme}</span></span>
                    <span class="text-sm text-gray-500 dark:text-gray-400 ml-2">(${unit.meaning})</span>
                </div>
                <span class="text-xs font-semibold px-2 py-1 rounded ${allDone ? 'bg-green-100 dark:bg-green-900 text-green-700 dark:text-green-300' : 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300'}">${completedCount}/${unitLessons.length}</span>
            </div>`;

            // Spelling words
            html += `<div class="text-xs text-gray-500 dark:text-gray-400 mb-3">
                <span class="font-semibold">Words:</span> ${unit.spelling_words.join(', ')}
            </div>`;

            // Lesson rows
            html += `<div class="space-y-1">`;
            for (const lesson of unitLessons) {
                const done = this.isCompleted('phom', lesson.lesson_number);
                html += `<div class="flex items-center gap-2 p-2 rounded-lg cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors ${done ? 'opacity-60' : ''}"
                    data-strand="phom" data-lesson="${lesson.lesson_number}" data-action="toggle">
                    <span class="text-lg ${done ? 'text-green-500' : 'text-gray-300 dark:text-gray-600'}">${done ? '&#10003;' : '&#9675;'}</span>
                    <span class="text-xs font-semibold px-2 py-0.5 rounded ${lesson.type === 'PPT' ? 'bg-blue-100 dark:bg-blue-900 text-blue-700 dark:text-blue-300' : lesson.type === 'Paper' ? 'bg-yellow-100 dark:bg-yellow-900 text-yellow-700 dark:text-yellow-300' : 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300'}">${lesson.type}</span>
                    <span class="text-sm flex-grow ${done ? 'line-through' : ''}">${lesson.description}</span>
                    ${lesson.spelling && lesson.spelling.type !== 'No spelling lesson this day' ? `<span class="text-xs text-orange-600 dark:text-orange-400">&#9834; Spelling</span>` : ''}
                    <button class="text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 p-1 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors" data-strand="phom" data-lesson="${lesson.lesson_number}" data-action="detail" title="View details"><i data-lucide="info" class="w-5 h-5"></i></button>
                </div>`;
            }
            html += `</div></div>`;
        }

        container.innerHTML = html;
    }

    // ── Reading Tracker ───────────────────────────────────────

    renderReading() {
        const container = document.getElementById('readingContainer');
        let html = '';

        for (const week of DATA.reading) {
            const weekLessons = week.lessons;
            const completedCount = weekLessons.filter(l => this.isCompleted('reading', l.lesson_number)).length;
            const allDone = completedCount === weekLessons.length;

            html += `<div class="bg-white dark:bg-gray-800 border-2 ${allDone ? 'border-green-400 dark:border-green-600' : 'border-gray-300 dark:border-gray-700'} rounded-xl p-4 shadow-sm mb-4">`;
            html += `<div class="flex justify-between items-center mb-3">
                <div>
                    <span class="font-bold text-gray-900 dark:text-gray-100">Week ${week.week}</span>
                    <span class="text-sm text-gray-500 dark:text-gray-400 ml-2">${week.comprehension_focus}</span>
                </div>
                <span class="text-xs font-semibold px-2 py-1 rounded ${allDone ? 'bg-green-100 dark:bg-green-900 text-green-700 dark:text-green-300' : 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300'}">${completedCount}/${weekLessons.length}</span>
            </div>`;

            // Text info
            html += `<div class="text-xs text-gray-500 dark:text-gray-400 mb-3">
                <span class="font-semibold">Text A:</span> ${week.text_a} (${week.source_a}) &middot;
                <span class="font-semibold">Text B:</span> ${week.text_b} (${week.source_b}) &middot;
                <span class="font-semibold">GO:</span> ${week.graphic_organiser}
            </div>`;

            html += `<div class="space-y-1">`;
            for (const lesson of weekLessons) {
                const done = this.isCompleted('reading', lesson.lesson_number);
                html += `<div class="flex items-center gap-2 p-2 rounded-lg cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors ${done ? 'opacity-60' : ''}"
                    data-strand="reading" data-lesson="${lesson.lesson_number}" data-action="toggle">
                    <span class="text-lg ${done ? 'text-green-500' : 'text-gray-300 dark:text-gray-600'}">${done ? '&#10003;' : '&#9675;'}</span>
                    <span class="text-xs font-semibold px-2 py-0.5 rounded ${lesson.type === 'PPT' ? 'bg-blue-100 dark:bg-blue-900 text-blue-700 dark:text-blue-300' : lesson.type === 'Paper' ? 'bg-yellow-100 dark:bg-yellow-900 text-yellow-700 dark:text-yellow-300' : 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300'}">${lesson.label}</span>
                    <span class="text-sm flex-grow ${done ? 'line-through' : ''}">${lesson.text}${lesson.source ? ` (${lesson.source})` : ''}</span>
                    <button class="text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 p-1 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors" data-strand="reading" data-lesson="${lesson.lesson_number}" data-action="detail" title="View details"><i data-lucide="info" class="w-5 h-5"></i></button>
                </div>`;
            }
            html += `</div></div>`;
        }

        container.innerHTML = html;
    }

    // ── Writing Tracker ───────────────────────────────────────

    renderWriting() {
        const container = document.getElementById('writingContainer');
        let html = '';

        for (const week of DATA.writing) {
            const weekLessons = week.lessons;
            const completedCount = weekLessons.filter(l => this.isCompleted('writing', l.lesson_number)).length;
            const allDone = completedCount === weekLessons.length;

            html += `<div class="bg-white dark:bg-gray-800 border-2 ${allDone ? 'border-green-400 dark:border-green-600' : 'border-gray-300 dark:border-gray-700'} rounded-xl p-4 shadow-sm mb-4">`;
            html += `<div class="flex justify-between items-center mb-3">
                <div>
                    <span class="font-bold text-gray-900 dark:text-gray-100">Week ${week.week}</span>
                </div>
                <span class="text-xs font-semibold px-2 py-1 rounded ${allDone ? 'bg-green-100 dark:bg-green-900 text-green-700 dark:text-green-300' : 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300'}">${completedCount}/${weekLessons.length}</span>
            </div>`;

            // Sentence level info
            if (week.sentence_level) {
                const sl = week.sentence_level;
                html += `<div class="text-xs text-purple-600 dark:text-purple-400 mb-3">
                    <span class="font-semibold">Sentence Level:</span> ${sl.title} (slide ${sl.slide})
                    ${sl.note ? ` &mdash; ${sl.note}` : ''}
                    ${sl.ppt_link ? ` <a href="${sl.ppt_link}" target="_blank" rel="noopener" class="underline hover:no-underline">PPT &#8599;</a>` : ''}
                </div>`;
            }

            html += `<div class="space-y-1">`;
            for (const lesson of weekLessons) {
                const done = this.isCompleted('writing', lesson.lesson_number);
                html += `<div class="flex items-center gap-2 p-2 rounded-lg cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors ${done ? 'opacity-60' : ''}"
                    data-strand="writing" data-lesson="${lesson.lesson_number}" data-action="toggle">
                    <span class="text-lg ${done ? 'text-green-500' : 'text-gray-300 dark:text-gray-600'}">${done ? '&#10003;' : '&#9675;'}</span>
                    <span class="text-xs font-semibold px-2 py-0.5 rounded bg-purple-100 dark:bg-purple-900 text-purple-700 dark:text-purple-300">${lesson.stage}</span>
                    <span class="text-sm flex-grow ${done ? 'line-through' : ''}">${lesson.type}: ${lesson.focus}</span>
                    <button class="text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 p-1 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors" data-strand="writing" data-lesson="${lesson.lesson_number}" data-action="detail" title="View details"><i data-lucide="info" class="w-5 h-5"></i></button>
                </div>`;
            }
            html += `</div></div>`;
        }

        container.innerHTML = html;
    }

    // ── Weekly Planner ────────────────────────────────────────

    renderPlanner() {
        const phomNext = this.getNextFive('phom');
        const readNext = this.getNextFive('reading');
        const writeNext = this.getNextFive('writing');

        const container = document.getElementById('plannerContent');

        // 5-column horizontal layout like maths planner
        let html = `<div class="grid grid-cols-5 gap-2">`;

        // Column headers (Day 1-5)
        for (let d = 0; d < 5; d++) {
            html += `<div class="text-center font-bold text-sm text-gray-700 dark:text-gray-300 pb-2 border-b-2 border-gray-300 dark:border-gray-600">Day ${d + 1}</div>`;
        }

        // PhOM row header
        html += `<div class="col-span-5 mt-4 mb-1">
            <span class="text-sm font-bold text-blue-700 dark:text-blue-300 uppercase tracking-wide">PhOM</span>
            ${phomNext.length > 0 ? `<span class="text-xs text-gray-500 dark:text-gray-400 ml-2">Unit ${phomNext[0].unit.unit}: ${phomNext[0].unit.morpheme} (${phomNext[0].unit.meaning})</span>` : ''}
        </div>`;

        // PhOM lesson boxes
        for (let d = 0; d < 5; d++) {
            const item = phomNext[d];
            if (item) {
                html += this.buildPlannerBox(item, 'phom');
            } else {
                html += `<div class="bg-gray-50 dark:bg-gray-800 rounded-lg p-2 text-center text-xs text-gray-400 italic">All done</div>`;
            }
        }

        // Reading row header
        html += `<div class="col-span-5 mt-4 mb-1">
            <span class="text-sm font-bold text-green-700 dark:text-green-300 uppercase tracking-wide">Reading</span>
            ${readNext.length > 0 ? `<span class="text-xs text-gray-500 dark:text-gray-400 ml-2">Week ${readNext[0].unit.week}: ${readNext[0].unit.comprehension_focus}</span>` : ''}
        </div>`;

        for (let d = 0; d < 5; d++) {
            const item = readNext[d];
            if (item) {
                html += this.buildPlannerBox(item, 'reading');
            } else {
                html += `<div class="bg-gray-50 dark:bg-gray-800 rounded-lg p-2 text-center text-xs text-gray-400 italic">All done</div>`;
            }
        }

        // Writing row header
        html += `<div class="col-span-5 mt-4 mb-1">
            <span class="text-sm font-bold text-purple-700 dark:text-purple-300 uppercase tracking-wide">Writing</span>
            ${writeNext.length > 0 ? `<span class="text-xs text-gray-500 dark:text-gray-400 ml-2">Week ${writeNext[0].unit.week}</span>` : ''}
        </div>`;

        for (let d = 0; d < 5; d++) {
            const item = writeNext[d];
            if (item) {
                html += this.buildPlannerBox(item, 'writing');
            } else {
                html += `<div class="bg-gray-50 dark:bg-gray-800 rounded-lg p-2 text-center text-xs text-gray-400 italic">All done</div>`;
            }
        }

        html += `</div>`;
        container.innerHTML = html;
    }

    // Color class maps to avoid dynamic Tailwind class names (JIT won't detect them)
    getColorClasses(strand) {
        const map = {
            phom: {
                border: 'border-blue-200 dark:border-blue-800',
                hoverBg: 'hover:bg-blue-50 dark:hover:bg-blue-900',
                linkBarBorder: 'border-blue-100 dark:border-blue-900',
                linkBarBg: 'bg-blue-50 dark:bg-blue-900 dark:bg-opacity-20',
                linkText: 'text-blue-600 dark:text-blue-400'
            },
            reading: {
                border: 'border-green-200 dark:border-green-800',
                hoverBg: 'hover:bg-green-50 dark:hover:bg-green-900',
                linkBarBorder: 'border-green-100 dark:border-green-900',
                linkBarBg: 'bg-green-50 dark:bg-green-900 dark:bg-opacity-20',
                linkText: 'text-green-600 dark:text-green-400'
            },
            writing: {
                border: 'border-purple-200 dark:border-purple-800',
                hoverBg: 'hover:bg-purple-50 dark:hover:bg-purple-900',
                linkBarBorder: 'border-purple-100 dark:border-purple-900',
                linkBarBg: 'bg-purple-50 dark:bg-purple-900 dark:bg-opacity-20',
                linkText: 'text-purple-600 dark:text-purple-400'
            }
        };
        return map[strand];
    }

    buildPlannerBox(item, strand) {
        const lesson = item.lesson;
        const unit = item.unit;
        const c = this.getColorClasses(strand);
        let summaryLines = [];
        let links = []; // { label, url }

        if (strand === 'phom') {
            summaryLines.push(`L${lesson.lesson_number} (Day ${lesson.day}) — ${lesson.type}`);
            summaryLines.push(lesson.description);
            if (lesson.link_to_rw) {
                summaryLines.push(`RW: ${lesson.link_to_rw.activity}`);
            }
            if (lesson.other_activity) {
                summaryLines.push(`Game: ${lesson.other_activity.activity}`);
            }
            if (lesson.spelling && lesson.spelling.type !== 'No spelling lesson this day') {
                summaryLines.push(`Spelling: ${lesson.spelling.type} (${lesson.spelling.duration_minutes}min)`);
            }
            // Resources — day 5 (Review) has no page numbers
            if (lesson.resources.ppt) links.push({ label: 'PPT', url: lesson.resources.ppt });
            if (lesson.resources.lesson_plans_pdf) {
                const page = lesson.resources.lesson_plans_page;
                links.push({ label: page ? `Plans p.${page}` : 'Plans PDF', url: lesson.resources.lesson_plans_pdf });
            }
            if (lesson.resources.activities_pdf) {
                let actLabel = 'Activities';
                if (lesson.resources.link_to_rw_page) actLabel += ` p.${lesson.resources.link_to_rw_page}`;
                links.push({ label: actLabel, url: lesson.resources.activities_pdf });
            }
            if (lesson.resources.owls_page) {
                links.push({ label: `OWLs p.${lesson.resources.owls_page}`, url: lesson.resources.lesson_plans_pdf });
            }
            if (lesson.spelling && lesson.spelling.resource) links.push({ label: 'Spelling PPT', url: lesson.spelling.resource });

        } else if (strand === 'reading') {
            summaryLines.push(`${lesson.label} — ${lesson.type}`);
            summaryLines.push(`Text: ${lesson.text}`);
            if (lesson.source) summaryLines.push(`Source: ${lesson.source}`);
            // Resources — day 5 (OWLs) has no lesson_plans_page
            if (lesson.resources.ppt_folder) links.push({ label: 'PPT Folder', url: lesson.resources.ppt_folder });
            if (lesson.resources.lesson_plans_pdf && lesson.resources.lesson_plans_page) {
                links.push({ label: `Plans p.${lesson.resources.lesson_plans_page}`, url: lesson.resources.lesson_plans_pdf });
            } else if (lesson.resources.lesson_plans_pdf && !lesson.resources.owls_page) {
                links.push({ label: 'Plans PDF', url: lesson.resources.lesson_plans_pdf });
            }
            if (lesson.resources.texts_folder) links.push({ label: 'Texts', url: lesson.resources.texts_folder });
            if (lesson.resources.owls_page) {
                links.push({ label: `OWLs p.${lesson.resources.owls_page}`, url: lesson.resources.lesson_plans_pdf });
            }

        } else if (strand === 'writing') {
            summaryLines.push(`L${lesson.lesson_number} — ${lesson.stage}`);
            summaryLines.push(`${lesson.type}: ${lesson.focus}`);
            if (unit.sentence_level) {
                summaryLines.push(`SL: ${unit.sentence_level.title} (slide ${unit.sentence_level.slide})`);
            }
            if (lesson.resources.writing_lesson_plans_pdf) links.push({ label: 'Lesson Plans', url: lesson.resources.writing_lesson_plans_pdf });
            if (unit.sentence_level && unit.sentence_level.ppt_link) links.push({ label: 'Sentence PPT', url: unit.sentence_level.ppt_link });
        }

        const copyText = summaryLines.join('\n');
        const strandLabel = strand === 'phom' ? 'PhOM' : strand.charAt(0).toUpperCase() + strand.slice(1);

        let html = `<div class="bg-white dark:bg-gray-800 border ${c.border} rounded-lg overflow-hidden">`;

        // Clickable copy area — copies lesson summary text
        html += `<div class="p-2 cursor-pointer ${c.hoverBg} dark:hover:bg-opacity-30 transition-colors planner-copy" data-copy="${this.escapeAttr(copyText)}" data-label="${strandLabel}">
            <div class="text-xs space-y-0.5">`;
        for (const line of summaryLines) {
            html += `<div class="text-gray-700 dark:text-gray-300">${this.escapeHtml(line)}</div>`;
        }
        html += `</div></div>`;

        // Resource links bar — each link opens in new tab, copy button copies URL
        if (links.length > 0) {
            html += `<div class="border-t ${c.linkBarBorder} px-2 py-1 ${c.linkBarBg} flex flex-wrap gap-x-2 gap-y-0.5 items-center">`;
            for (const link of links) {
                html += `<span class="inline-flex items-center gap-0.5">
                    <a href="${link.url}" target="_blank" rel="noopener" class="text-xs ${c.linkText} underline hover:no-underline">${link.label} &#8599;</a>
                    <button class="copy-link-btn text-xs text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 px-0.5" data-url="${this.escapeAttr(link.url)}" data-label="${this.escapeAttr(link.label)}" title="Copy link">&#9112;</button>
                </span>`;
            }
            html += `</div>`;
        }

        html += `</div>`;
        return html;
    }

    // ── Lesson Detail Modal ───────────────────────────────────

    showLessonDetail(strand, lessonNum) {
        let lesson, unit;
        for (const u of DATA[strand]) {
            for (const l of u.lessons) {
                if (l.lesson_number === lessonNum) {
                    lesson = l;
                    unit = u;
                    break;
                }
            }
            if (lesson) break;
        }
        if (!lesson) return;

        let title = '';
        let body = '';

        if (strand === 'phom') {
            title = `PhOM Unit ${unit.unit}: ${unit.morpheme} &mdash; Lesson ${lesson.lesson_number}`;
            body += `<div><span class="font-semibold">Type:</span> ${lesson.type}</div>`;
            body += `<div><span class="font-semibold">Description:</span> ${lesson.description}</div>`;
            if (lesson.link_to_rw) {
                body += `<div><span class="font-semibold">Read/Write Activity:</span> ${lesson.link_to_rw.activity} (${lesson.link_to_rw.activity_key})</div>`;
            }
            if (lesson.other_activity) {
                body += `<div><span class="font-semibold">Game/Activity:</span> ${lesson.other_activity.activity} (${lesson.other_activity.activity_key})</div>`;
            }
            if (lesson.spelling && lesson.spelling.type !== 'No spelling lesson this day') {
                body += `<div class="mt-2 p-2 bg-orange-50 dark:bg-orange-900 dark:bg-opacity-20 rounded">
                    <span class="font-semibold text-orange-700 dark:text-orange-300">Spelling:</span> ${lesson.spelling.type} (${lesson.spelling.duration_minutes}min)<br>
                    <span class="text-xs">${lesson.spelling.description || ''}</span>
                </div>`;
            }
            // Resource links
            body += `<div class="mt-3 pt-3 border-t border-gray-200 dark:border-gray-600 space-y-1">`;
            body += `<div class="font-semibold text-sm">Resources</div>`;
            const r = lesson.resources;
            if (r.ppt) body += `<div><a href="${r.ppt}" target="_blank" class="text-blue-600 dark:text-blue-400 underline text-sm">Lesson PPT &#8599;</a></div>`;
            if (r.lesson_plans_pdf) body += `<div><a href="${r.lesson_plans_pdf}" target="_blank" class="text-blue-600 dark:text-blue-400 underline text-sm">Lesson Plans PDF (p.${r.lesson_plans_page || '?'}) &#8599;</a></div>`;
            if (r.activities_pdf) body += `<div><a href="${r.activities_pdf}" target="_blank" class="text-blue-600 dark:text-blue-400 underline text-sm">Activities PDF (RW p.${r.link_to_rw_page || '?'}, Game p.${r.game_page || '?'}) &#8599;</a></div>`;
            if (lesson.spelling && lesson.spelling.resource) body += `<div><a href="${lesson.spelling.resource}" target="_blank" class="text-blue-600 dark:text-blue-400 underline text-sm">Spelling PPT &#8599;</a></div>`;
            body += `<div class="text-xs text-gray-500 dark:text-gray-400 mt-2">Words: ${unit.spelling_words.join(', ')}</div>`;
            body += `<div class="text-xs text-gray-500 dark:text-gray-400">Transfer: ${unit.transfer_words.join(', ')}</div>`;
            body += `</div>`;

        } else if (strand === 'reading') {
            title = `Reading Week ${unit.week} &mdash; ${lesson.label}`;
            body += `<div><span class="font-semibold">Type:</span> ${lesson.type}</div>`;
            body += `<div><span class="font-semibold">Text:</span> ${lesson.text}${lesson.source ? ` (${lesson.source})` : ''}</div>`;
            body += `<div><span class="font-semibold">Focus:</span> ${unit.comprehension_focus}</div>`;
            body += `<div><span class="font-semibold">Graphic Organiser:</span> ${unit.graphic_organiser}</div>`;
            body += `<div class="mt-3 pt-3 border-t border-gray-200 dark:border-gray-600 space-y-1">`;
            body += `<div class="font-semibold text-sm">Resources</div>`;
            const r = lesson.resources;
            if (r.ppt_folder) body += `<div><a href="${r.ppt_folder}" target="_blank" class="text-green-600 dark:text-green-400 underline text-sm">Comprehension PPT Folder &#8599;</a></div>`;
            if (r.lesson_plans_pdf) body += `<div><a href="${r.lesson_plans_pdf}" target="_blank" class="text-green-600 dark:text-green-400 underline text-sm">Lesson Plans PDF (p.${r.lesson_plans_page || '?'}) &#8599;</a></div>`;
            if (r.texts_folder) body += `<div><a href="${r.texts_folder}" target="_blank" class="text-green-600 dark:text-green-400 underline text-sm">Reading Texts Folder &#8599;</a></div>`;
            if (r.owls_page) body += `<div><a href="${r.lesson_plans_pdf}" target="_blank" class="text-green-600 dark:text-green-400 underline text-sm">OWLs (p.${r.owls_page}) &#8599;</a></div>`;
            body += `</div>`;

        } else if (strand === 'writing') {
            title = `Writing Week ${unit.week} &mdash; Lesson ${lesson.lesson_number}`;
            body += `<div><span class="font-semibold">Stage:</span> ${lesson.stage}</div>`;
            body += `<div><span class="font-semibold">Type:</span> ${lesson.type}</div>`;
            body += `<div><span class="font-semibold">Focus:</span> ${lesson.focus}</div>`;
            if (unit.sentence_level) {
                body += `<div class="mt-2 p-2 bg-purple-50 dark:bg-purple-900 dark:bg-opacity-20 rounded">
                    <span class="font-semibold text-purple-700 dark:text-purple-300">Sentence Level:</span> ${unit.sentence_level.title} (slide ${unit.sentence_level.slide})
                    ${unit.sentence_level.note ? `<br><span class="text-xs">${unit.sentence_level.note}</span>` : ''}
                </div>`;
            }
            body += `<div class="mt-3 pt-3 border-t border-gray-200 dark:border-gray-600 space-y-1">`;
            body += `<div class="font-semibold text-sm">Resources</div>`;
            if (lesson.resources.writing_lesson_plans_pdf) body += `<div><a href="${lesson.resources.writing_lesson_plans_pdf}" target="_blank" class="text-purple-600 dark:text-purple-400 underline text-sm">Writing Lesson Plans PDF &#8599;</a></div>`;
            if (unit.sentence_level && unit.sentence_level.ppt_link) body += `<div><a href="${unit.sentence_level.ppt_link}" target="_blank" class="text-purple-600 dark:text-purple-400 underline text-sm">Sentence Level PPT &#8599;</a></div>`;
            body += `</div>`;
        }

        document.getElementById('modalTitle').innerHTML = title;
        document.getElementById('modalBody').innerHTML = body;
        document.getElementById('lessonModal').classList.remove('hidden');
    }

    // ── Event Listeners ───────────────────────────────────────

    setupEventListeners() {
        // Tab switching
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => this.switchTab(btn.dataset.tab));
        });

        // Mark next buttons
        document.getElementById('phomMarkNextBtn').addEventListener('click', () => this.markNextComplete('phom'));
        document.getElementById('readingMarkNextBtn').addEventListener('click', () => this.markNextComplete('reading'));
        document.getElementById('writingMarkNextBtn').addEventListener('click', () => this.markNextComplete('writing'));

        // Reset buttons
        document.getElementById('phomResetBtn').addEventListener('click', () => this.resetStrand('phom'));
        document.getElementById('readingResetBtn').addEventListener('click', () => this.resetStrand('reading'));
        document.getElementById('writingResetBtn').addEventListener('click', () => this.resetStrand('writing'));

        // Export/Import
        document.getElementById('exportBtn').addEventListener('click', () => this.exportData());
        document.getElementById('importBtn').addEventListener('click', () => document.getElementById('importFile').click());
        document.getElementById('importFile').addEventListener('change', (e) => this.importData(e));

        // Delegated click handlers for lesson toggles and details
        for (const id of ['phomContainer', 'readingContainer', 'writingContainer']) {
            document.getElementById(id).addEventListener('click', (e) => {
                const toggleEl = e.target.closest('[data-action="toggle"]');
                const detailEl = e.target.closest('[data-action="detail"]');

                if (detailEl) {
                    e.stopPropagation();
                    this.showLessonDetail(detailEl.dataset.strand, parseInt(detailEl.dataset.lesson));
                } else if (toggleEl) {
                    this.toggleLesson(toggleEl.dataset.strand, parseInt(toggleEl.dataset.lesson));
                }
            });
        }

        // Planner copy clicks
        document.getElementById('plannerContent').addEventListener('click', (e) => {
            // Copy-link button — copies just the URL
            const linkBtn = e.target.closest('.copy-link-btn');
            if (linkBtn) {
                e.stopPropagation();
                const url = linkBtn.dataset.url;
                const label = linkBtn.dataset.label;
                navigator.clipboard.writeText(url).then(() => {
                    this.showToast(`${label} link copied!`);
                }).catch(() => {
                    this.showToast(`${label} link copied!`);
                });
                return;
            }

            // Summary copy — copies lesson text
            const copyEl = e.target.closest('.planner-copy');
            if (copyEl) {
                const text = copyEl.dataset.copy;
                const label = copyEl.dataset.label;
                navigator.clipboard.writeText(text).then(() => {
                    this.showToast(`${label} copied!`);
                }).catch(() => {
                    this.showToast(`${label} copied!`);
                });
            }
        });

        // Modal close
        document.getElementById('modalClose').addEventListener('click', () => {
            document.getElementById('lessonModal').classList.add('hidden');
        });
        document.getElementById('lessonModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('lessonModal')) {
                document.getElementById('lessonModal').classList.add('hidden');
            }
        });
    }

    switchTab(tabName) {
        document.querySelectorAll('.tab-btn').forEach(t => {
            t.classList.remove('text-blue-600', 'dark:text-blue-400');
            t.classList.add('text-gray-500', 'dark:text-gray-400');
            t.style.borderBottom = '';
        });
        const activeTab = document.querySelector(`[data-tab="${tabName}"]`);
        activeTab.classList.add('text-blue-600', 'dark:text-blue-400');
        activeTab.classList.remove('text-gray-500', 'dark:text-gray-400');
        activeTab.style.borderBottom = '3px solid currentColor';

        document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
        document.getElementById(tabName).classList.remove('hidden');

        // Re-render planner when switching to it (picks up latest progress)
        if (tabName === 'planner') this.renderPlanner();
    }

    showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.remove('opacity-0', 'pointer-events-none');
        toast.classList.add('opacity-100');
        setTimeout(() => {
            toast.classList.remove('opacity-100');
            toast.classList.add('opacity-0', 'pointer-events-none');
        }, 1500);
    }

    // ── Export / Import ───────────────────────────────────────

    exportData() {
        const data = JSON.stringify(this.progress, null, 2);
        const blob = new Blob([data], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `bsla-literacy-progress-${new Date().toISOString().split('T')[0]}.json`;
        a.click();
        URL.revokeObjectURL(url);
    }

    importData(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const imported = JSON.parse(e.target.result);
                if (imported.phom && imported.reading && imported.writing) {
                    this.progress = imported;
                    this.saveProgress();
                    this.render();
                    this.showToast('Progress imported!');
                } else {
                    alert('Invalid file format. Expected phom, reading, and writing keys.');
                }
            } catch (err) {
                alert('Error importing file. Please check the file format.');
            }
        };
        reader.readAsText(file);
        event.target.value = '';
    }

    // ── Utilities ─────────────────────────────────────────────

    escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    escapeAttr(str) {
        return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
}

// Initialize
const planner = new LiteracyPlanner();
planner.init();
</script>
